security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        users_in_memory: { memory: null }
        app_user_provider:
            entity:
                class: App\Entity\User

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/login_check
            provider: app_user_provider
            stateless: true
            json_login:
                username_path: email
                password_path: password
                check_path: /api/login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            provider: app_user_provider
            stateless: true
            entry_point: jwt
            jwt: ~
            refresh_jwt:
                check_path: /api/token/refresh

        main:
            lazy: true
            provider: app_user_provider
            entry_point: form_login
            form_login:
                login_path: app_login
                default_target_path: app_home
                check_path: app_login
                enable_csrf: true
            # oauth:
            #     resource_owners:
            #         google: "/login/check-google"
            #     login_path:   /connect/login
            #     check_path:   /login/check-google
            #     use_forward:  false
            #     failure_path: /login
            #
            #     oauth_user_provider:
            #         service: my.auth_aware.user_provider.service
            #
            logout:
                path: app_logout
                target: app_login

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/login, role: PUBLIC_ACCESS }
        - { path: ^/signin, role: PUBLIC_ACCESS }

        # SANITAS DOES NOT HAVE JWT's SO>>>>>>>>>
        - { path: ^/mock-api, role: PUBLIC_ACCESS }

        - { path: ^/api/register_user, roles: PUBLIC_ACCESS, methods: ['OPTIONS', 'POST'] }
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS, methods: ['OPTIONS'] }
        - { path: ^/api/(login|token/refresh), roles: PUBLIC_ACCESS }

        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/, roles: [IS_AUTHENTICATED_FULLY] }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
